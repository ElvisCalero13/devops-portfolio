apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: project-2-api
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: project-2-api
  namespaceSelector:
    matchNames:
      - project-2
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
