apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: project-2-api-hpa
  namespace: project-2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: project-2-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
